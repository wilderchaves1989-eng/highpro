<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HIGH PRO | Controlo de Horas</title>
  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/geist-sans/geist-sans.min.css" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#0454EF;--primary-dark:#0239A6;--primary-light:#E6F0FF;--primary-ghost:#F5F8FF;
      --success:#00A86B;--success-light:#E6F7F0;--danger:#D32F2F;--danger-light:#FFEBEE;
      --warning:#F57C00;--warning-light:#FFF3E0;--info:#1976D2;--info-light:#E3F2FD;
      --text-primary:#1A1A1A;--text-secondary:#5A5A5A;--text-tertiary:#8A8A8A;--text-inverse:#FFFFFF;
      --surface:#FFFFFF;--background:#F8F9FC;--border:#E8ECF2;--hover-bg:#F2F5FC;
      --font:'SF Pro Display','Geist Sans','Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Inter',Helvetica,Arial,sans-serif;
      --shadow-sm:0 2px 6px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
      --shadow-md:0 8px 24px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);
      --shadow-lg:0 24px 48px rgba(0,0,0,0.12);
      --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
    }
    body{font-family:'SF Pro Display','Geist Sans','Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Inter',Helvetica,Arial,sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5;font-weight:400}
    .app-container{min-height:100vh;display:flex;flex-direction:column}
    .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
    .toast{padding:14px 24px;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn 0.3s cubic-bezier(0.16,1,0.3,1);max-width:400px;display:flex;align-items:center;gap:10px;pointer-events:auto;backdrop-filter:blur(8px)}
    .toast.success{background:rgba(0,168,107,0.95)}.toast.error{background:rgba(211,47,47,0.95)}.toast.info{background:rgba(25,118,210,0.95)}.toast.warning{background:rgba(245,124,0,0.95)}
    .toast.fade-out{animation:fadeOut 0.2s ease forwards}
    @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
    .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);backdrop-filter:blur(12px);background:rgba(255,255,255,0.9)}
    .app-logo{width:56px;height:56px;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(4,84,239,0.25))}
    .app-logo svg{width:100%;height:100%;display:block}
    .app-brand{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;font-weight:700;color:#000000;letter-spacing:-0.3px;line-height:1.2}
    .app-brand span{display:block;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:9px;color:#000000;letter-spacing:2.5px;font-weight:600;text-transform:uppercase;opacity:0.6}
    .app-header-actions{display:flex;align-items:center;gap:12px;margin-left:auto}
    .header-icon-btn{background:transparent;border:none;cursor:pointer;color:var(--text-secondary);font-size:20px;padding:8px;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
    .header-icon-btn:hover{background:var(--primary-ghost);color:var(--primary)}
    .search-box{display:flex;align-items:center;background:var(--hover-bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;gap:8px;width:200px}
    .search-box input{background:transparent;border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text-primary);flex:1}
    .search-box input::placeholder{color:var(--text-tertiary)}
    .app-header-info{text-align:right}
    .app-header-info .date{font-size:13px;font-weight:600;color:var(--text-primary)}
    .app-header-info .subtitle{font-size:10px;color:var(--text-tertiary);letter-spacing:0.5px}
    .page-container{max-width:1440px;margin:0 auto;padding:28px 28px 40px;width:100%;flex:1}
    .top-bar{display:flex;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
    .top-bar-title h1{font-size:26px;font-weight:700;letter-spacing:-0.5px;color:var(--text-primary);margin-bottom:4px}
    .top-bar-title p{font-size:13px;color:var(--text-secondary)}
    .top-bar-actions{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;font-size:13px;transition:all 0.2s ease;font-family:inherit;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;text-decoration:none;letter-spacing:-0.2px}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(4,84,239,0.2)}.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 6px 16px rgba(4,84,239,0.3)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ghost)}
    .btn-sm{padding:6px 14px;font-size:12px;border-radius:6px;font-weight:600}
    .quick-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
    .quick-stat{background:var(--surface);border-radius:var(--radius-md);padding:18px 22px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all 0.2s}
    .quick-stat[onclick]:hover{box-shadow:var(--shadow-md);border-color:var(--primary);cursor:pointer}
    .quick-stat[onclick]:active{transform:scale(0.98)}
    .quick-stat-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px}
    .quick-stat-value{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;color:#2A2A2A}
    .quick-stat-sub{font-size:11px;color:var(--text-tertiary);margin-top:4px}
    .horas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:28px}
    .colaborador-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;transition:all 0.25s ease;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
    .colaborador-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:#d0d8e8}
    .colaborador-card.inativo{opacity:0.65;filter:grayscale(0.3)}
    .colaborador-card.transferido{opacity:0.75;border-left:3px solid #E65100}
    .colab-card-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
    .colab-card-body{padding:6px 16px 4px;flex:1;display:flex;flex-direction:column}
    .colab-card-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;background:#fafbfc}
    .colab-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:0 4px 8px rgba(0,0,0,0.08)}
    .colab-info{flex:1;min-width:0}
    .colab-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--text-primary)}
    .colab-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;font-weight:400}
    .colab-id{font-size:9px;color:var(--primary);opacity:0.7;margin-left:4px;font-weight:500;font-family:'SF Mono','Menlo','Monaco',monospace;letter-spacing:0.5px;cursor:pointer}
    .colab-id:hover{opacity:1;text-decoration:underline}
    .colab-horas-list{display:flex;flex-direction:column;gap:1px;max-height:220px;overflow-y:auto;margin:6px 0 4px;padding-right:2px}
    .colab-horas-list::-webkit-scrollbar{width:4px}.colab-horas-list::-webkit-scrollbar-track{background:transparent}.colab-horas-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
    .colab-btn-registro{width:100%;justify-content:center;margin-bottom:4px;font-size:11px;padding:6px 12px;font-weight:600;letter-spacing:0.3px}
    .hora-row{display:grid;grid-template-columns:72px 42px 1fr 20px;align-items:center;gap:6px;padding:7px 10px;border-radius:6px;font-size:12px;transition:background 0.15s;cursor:default}
    .hora-row:hover{background:var(--hover-bg)}.hora-row:nth-child(even){background:#FAFBFC}.hora-row:nth-child(even):hover{background:var(--hover-bg)}
    .hora-val{font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .hora-row.trabalhado .hora-val{color:var(--text-primary)}.hora-row.extra50 .hora-val{color:#E65100}.hora-row.extra100 .hora-val{color:#C62828}
    .hora-row.falta .hora-val{color:var(--danger)}.hora-row.feriado .hora-val{color:#0D47A1}.hora-row.atestado .hora-val{color:#BF360C}
    .hora-dia{color:var(--text-secondary);font-weight:500;font-variant-numeric:tabular-nums}
    .hora-dow{color:var(--text-tertiary);font-size:11px;font-weight:500}
    .hora-del{cursor:pointer;color:#ccc;font-size:14px;text-align:right;transition:color 0.15s;padding:2px 4px;border-radius:4px;line-height:1}
    .hora-del:hover{color:var(--danger);background:var(--danger-light)}
    .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.2px;line-height:1}
    .badge-purple{background:#F3E5F5;color:#6A1B9A}.badge-orange{background:#FFF3E0;color:#E65100}
    .badge-status{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.2px;line-height:1;margin-left:6px}
    .badge-ativo{display:none}
    .badge-inativo{background:#FFEBEE;color:#B71C1C}
    .badge-transferido{background:#FFF3E0;color:#E65100}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:var(--radius-lg);padding:28px 32px;width:500px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn 0.25s cubic-bezier(0.16,1,0.3,1)}
    @keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:24px;letter-spacing:-0.3px;color:var(--text-primary)}
    .modal-subtitle{font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border 0.2s,box-shadow 0.2s;background:#fff;color:var(--text-primary)}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(4,84,239,0.08)}
    .form-group textarea{resize:vertical;min-height:60px}
    .form-group .helper-text{font-size:11px;color:var(--text-tertiary);margin-top:5px;line-height:1.4}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .empty-state{text-align:center;padding:70px 20px;color:var(--text-tertiary)}
    .empty-state-icon{width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:300;margin:0 auto 16px;opacity:0.8}
    .empty-state-text{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)}
    .empty-state-sub{font-size:13px;margin-bottom:24px;color:var(--text-tertiary)}
    .app-footer{text-align:center;padding:20px;color:var(--text-tertiary);font-size:11px;border-top:1px solid var(--border);margin-top:10px;letter-spacing:0.2px}
    .tab-btn{transition:all 0.2s ease}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)!important;font-weight:700}
    .ficha-section{margin-bottom:20px}
    .ficha-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
    .ficha-value{font-size:13px;color:var(--text-primary);font-weight:500;padding:10px 14px;background:var(--primary-ghost);border-radius:6px;border:1px solid var(--primary-light)}
    .ficha-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border 0.2s}
    .ficha-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(4,84,239,0.08)}
    .movimentacao-item{padding:14px;background:var(--primary-ghost);border-left:3px solid var(--primary);border-radius:6px;margin-bottom:12px}
    .movimentacao-date{font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase}
    .movimentacao-desc{font-size:13px;color:var(--text-primary);font-weight:600;margin:6px 0 4px}
    .movimentacao-detail{font-size:12px;color:var(--text-secondary)}
    .skill-badge{display:inline-flex;align-items:center;padding:6px 12px;background:var(--primary);color:#fff;border-radius:20px;font-size:12px;font-weight:600;margin:4px 4px 4px 0}
    .skill-input-group{display:flex;gap:8px;margin-bottom:12px}
    .skill-input-group input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px}
    .skill-input-group button{padding:8px 12px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
    @media(max-width:768px){.horas-grid{grid-template-columns:1fr}.top-bar{flex-direction:column;align-items:flex-start;gap:14px}.top-bar-actions{margin-left:0;width:100%;flex-wrap:wrap}.quick-stats{grid-template-columns:repeat(2,1fr)}.page-container{padding:20px 16px}.modal{padding:22px 20px}.form-row{grid-template-columns:1fr}}
  </style>
</head>

    </div>
    <div class="app-brand">HIGH PRO <span style="font-weight:400;font-size:14px;letter-spacing:0.5px">Solutions</span><span style="font-size:9px;letter-spacing:2.5px;text-transform:uppercase;opacity:0.6;display:block">Controlo de Horas</span></div>
    <div class="app-header-actions">
      <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchColab" placeholder="Buscar colaborador...">
      </div>
      <button class="header-icon-btn" title="Contacto" onclick="HORAS.abrirContato()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
      </button>
      <button class="header-icon-btn" title="Ajuda" onclick="HORAS.abrirAjuda()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <path d="M12 17h.01"></path>
        </svg>
      </button>
      <div class="app-header-info"><div class="date" id="headerDate"></div><div class="subtitle">SaaS v2.0</div></div>
    </div>
  </header>
  <main class="page-container" id="mainContent"></main>
  <footer class="app-footer">HIGH PRO Solutions · Controlo de Horas · &copy; 2026 · Todos os direitos reservados</footer>
</div>

<div class="modal-overlay" id="modalHoras">
  <div class="modal"><div class="modal-title" id="modalHorasTitle">Lançar Horas</div>
    <div class="form-group"><label>Data</label><input type="date" id="lhData"></div>
    <div class="form-group"><label>Tipo de Registo</label><select id="lhTipo" onchange="HORAS.toggleHorasInput()"><option value="horas">Horas Trabalhadas</option><option value="falta">Falta</option><option value="feriado">Feriado</option><option value="atestado">Atestado Médico</option></select></div>
    <div class="form-group" id="lhHorasGroup"><label>Quantidade de Horas</label><input type="number" id="lhHoras" value="8" min="0.5" max="24" step="0.5"><div class="helper-text" id="lhExtraInfo" style="display:none"></div></div>
    <div class="form-group" id="lhCategoriaGroup" style="display:none"><label>Tipo de Atestado</label><select id="lhCategoriaAtestado" onchange="HORAS.atualizarObsCategoria()"><option value="">Selecione...</option><optgroup label="Doenças Gerais"><option>Doença Geral</option><option>Gripe</option><option>COVID-19</option></optgroup></select></div>
    <div class="form-group"><label>Observação</label><textarea id="lhObs" rows="2" placeholder="Detalhes adicionais..."></textarea></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="HORAS.closeModal('modalHoras')">Cancelar</button><button class="btn btn-primary" onclick="HORAS.salvarHoras()">Lançar Registo</button></div>
  </div>
</div>

<div class="modal-overlay" id="modalColab">
  <div class="modal"><div class="modal-title" id="modalColabTitle">Novo Colaborador</div>
    <div class="form-group"><label>ID</label><input type="text" id="newId" placeholder="ID do colaborador" disabled></div>
    <div class="form-group"><label>Nome</label><input type="text" id="newNome" placeholder="Ex: João Silva"></div>
    <div class="form-group"><label>Cargo</label><select id="newCargo"><option value="">Selecione uma profissão</option><option value="Operário">Operário</option><option value="Soldador">Soldador</option></select></div>
    <div class="form-group"><label>Tipo de Contrato</label><select id="newTipoContrato" onchange="HORAS.toggleContractFields()"><option value="incerto">Termo Incerto</option><option value="fixo">Fixo de Portugal</option></select></div>
    <div class="form-group" id="valorHoraGroup"><label>Valor/Hora (€)</label><input type="number" id="newValorHora" value="12" step="0.5" min="1"></div>
    <div class="form-group" id="vencimentoGroup" style="display:none"><label>Vencimento Mensal (€)</label><input type="number" id="newVencimentoMensal" value="820" step="10" min="100"></div>
    <div class="form-group"><label>Status</label><select id="newStatus"><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select></div>
    <div class="form-group"><label>Data de Início</label><input type="date" id="newDataInicio"></div>
    <div class="form-group"><label>Cor</label><input type="color" id="newCor" value="#0454EF"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="HORAS.closeModal('modalColab')">Cancelar</button><button class="btn btn-primary" id="btnSalvarColab" onclick="HORAS.salvarColaborador()">Guardar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modalContato">
  <div class="modal"><div class="modal-title">Contacte-nos</div>
    <div class="modal-subtitle">Tem dúvidas ou precisa de suporte?</div>
    <div class="form-group"><label>E-mail</label><input type="email" value="support@highpro.pt" readonly style="background:#f5f5f5"></div>

<div class="modal-overlay" id="modalAjuda">
  <div class="modal"><div class="modal-title">Ajuda</div>
    <p>Sistema HIGH PRO - Controlo de Horas 24/7 com sincronização em nuvem</p>
    <div class="modal-actions"><button class="btn btn-primary" onclick="HORAS.closeModal('modalAjuda')">Fechar</button></div>
  </div>
</div>

<script>
const TURNO_NORMAL=8,ACRESCIMO_50=0.5,ACRESCIMO_100=1.0;
const FERIADOS=['2026-01-01','2026-04-25','2026-05-01','2026-06-10'];
const DIAS_SEMANA=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];

function sanitize(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML;}
function formatDate(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getDow(iso){const[y,m,d]=iso.split('-');return new Date(+y,+m-1,+d).getDay();}
function isFeriado(d){return FERIADOS.includes(d);}
function initials(n){return n.split(' ').map(x=>x[0]).join('').substring(0,2).toUpperCase();}
function formatCurrency(v){return'€'+v.toFixed(2).replace('.',',');}
function toast(msg,tipo){tipo=tipo||'info';const c=document.getElementById('toastContainer');const el=document.createElement('div');el.className='toast '+tipo;el.innerHTML=msg;c.appendChild(el);setTimeout(()=>el.remove(),2800);}

const HORAS={
  colaboradores:JSON.parse(localStorage.getItem('hp_colab_saas_v2')||'null')||[
    {id:'HP-26-001',nome:'Mauro',cargo:'Operário',tipoContrato:'fixo',valorHora:0,vencimento:820,cor:'#0454EF',ativo:true,inicio:'2026-05-26',status:'ativo',motivoInativo:'',dataTransferencia:'',localTransferencia:''},
    {id:'HP-26-002',nome:'Rodrigo',cargo:'Operário',tipoContrato:'incerto',valorHora:12,vencimento:0,cor:'#D32F2F',ativo:true,inicio:'2026-05-26',status:'ativo',motivoInativo:'',dataTransferencia:'',localTransferencia:''},
    {id:'HP-26-003',nome:'Wilder',cargo:'Operário',tipoContrato:'incerto',valorHora:12,vencimento:0,cor:'#00A86B',ativo:true,inicio:'2026-06-02',status:'ativo',motivoInativo:'',dataTransferencia:'',localTransferencia:''}
  ],
  horas:JSON.parse(localStorage.getItem('hp_horas_saas_v2')||'null')||{
    'HP-26-001':[{data:'2026-06-01',tipo:'horas',qtd:9,obs:''},{data:'2026-06-02',tipo:'horas',qtd:10,obs:''},{data:'2026-06-03',tipo:'horas',qtd:10,obs:''},{data:'2026-06-05',tipo:'horas',qtd:10,obs:''},{data:'2026-06-06',tipo:'horas',qtd:8,obs:'Sábado'},{data:'2026-06-08',tipo:'horas',qtd:9,obs:''},{data:'2026-06-09',tipo:'horas',qtd:12,obs:''},{data:'2026-06-11',tipo:'horas',qtd:9,obs:''},{data:'2026-06-12',tipo:'horas',qtd:11,obs:''},{data:'2026-06-15',tipo:'horas',qtd:9,obs:''},{data:'2026-06-16',tipo:'horas',qtd:10,obs:''},{data:'2026-06-17',tipo:'atestado',qtd:0,obs:'Febre alta',categoria:'Gripe'},{data:'2026-06-18',tipo:'horas',qtd:10,obs:''},{data:'2026-06-19',tipo:'horas',qtd:9,obs:''},{data:'2026-06-22',tipo:'horas',qtd:9,obs:''},{data:'2026-06-23',tipo:'horas',qtd:8,obs:''},{data:'2026-06-24',tipo:'horas',qtd:10,obs:''}],
    'HP-26-002':[{data:'2026-06-01',tipo:'horas',qtd:8,obs:''},{data:'2026-06-02',tipo:'horas',qtd:8,obs:''},{data:'2026-06-03',tipo:'falta',qtd:0,obs:''},{data:'2026-06-04',tipo:'horas',qtd:8,obs:''},{data:'2026-06-05',tipo:'horas',qtd:4,obs:'Saiu cedo'},{data:'2026-06-15',tipo:'horas',qtd:9,obs:''},{data:'2026-06-16',tipo:'horas',qtd:10,obs:''},{data:'2026-06-18',tipo:'horas',qtd:2,obs:''},{data:'2026-06-19',tipo:'horas',qtd:10,obs:''},{data:'2026-06-24',tipo:'horas',qtd:8,obs:''},{data:'2026-06-25',tipo:'horas',qtd:10,obs:''}],
    'HP-26-003':[{data:'2026-06-02',tipo:'horas',qtd:10,obs:''},{data:'2026-06-03',tipo:'horas',qtd:10,obs:''},{data:'2026-06-04',tipo:'horas',qtd:8,obs:''},{data:'2026-06-05',tipo:'horas',qtd:7,obs:'Saiu cedo'},{data:'2026-06-08',tipo:'horas',qtd:10,obs:''},{data:'2026-06-09',tipo:'horas',qtd:10,obs:''},{data:'2026-06-10',tipo:'horas',qtd:10,obs:'Feriado'},{data:'2026-06-11',tipo:'horas',qtd:10,obs:''},{data:'2026-06-12',tipo:'horas',qtd:7,obs:''},{data:'2026-06-15',tipo:'horas',qtd:10,obs:''},{data:'2026-06-16',tipo:'horas',qtd:10,obs:''},{data:'2026-06-17',tipo:'horas',qtd:10,obs:''},{data:'2026-06-18',tipo:'horas',qtd:10,obs:''},{data:'2026-06-19',tipo:'horas',qtd:10,obs:''},{data:'2026-06-20',tipo:'horas',qtd:10,obs:'Sábado'},{data:'2026-06-22',tipo:'horas',qtd:10,obs:''},{data:'2026-06-23',tipo:'horas',qtd:10,obs:''},{data:'2026-06-24',tipo:'horas',qtd:10,obs:''},{data:'2026-06-25',tipo:'horas',qtd:10,obs:''}]
  },
  save(){localStorage.setItem('hp_colab_saas_v2',JSON.stringify(this.colaboradores));localStorage.setItem('hp_horas_saas_v2',JSON.stringify(this.horas));fetch('/api/dados',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({colaboradores:this.colaboradores,horas:this.horas})}).then(r=>r.json()).then(()=>{toast('✅ Sincronizado','success');}).catch(e=>{console.error('Erro:',e);toast('⚠️ Erro ao sincronizar','warning');});},
  openModal(id){document.getElementById(id).classList.add('show');},
  closeModal(id){document.getElementById(id).classList.remove('show');},
  render(){const ativos=this.colaboradores.filter(c=>c.ativo);const totalHoras=ativos.reduce((s,c)=>s+(this.horas[c.id]||[]).reduce((h,r)=>h+(r.tipo==='horas'?r.qtd:0),0),0);document.getElementById('headerDate').textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});let html=`<div class="top-bar"><h1>Controlo de Horas</h1><p>${ativos.length} colaboradores ativos</p><button class="btn btn-primary" onclick="HORAS.abrirModalColab()">Novo Colaborador</button><button class="btn btn-outline" onclick="HORAS.save()">Guardar</button></div><div class="quick-stats"><div class="quick-stat"><div class="quick-stat-label">Colaboradores</div><div class="quick-stat-value">${ativos.length}</div></div><div class="quick-stat"><div class="quick-stat-label">Total Horas</div><div class="quick-stat-value">${totalHoras}H</div></div></div>`;if(ativos.length===0){html+=`<div class="empty-state"><div class="empty-state-text">Nenhum colaborador</div><button class="btn btn-primary" onclick="HORAS.abrirModalColab()">Adicionar</button></div>`;}else{html+='<div class="horas-grid">';ativos.forEach(c=>{const registos=(this.horas[c.id]||[]).sort((a,b)=>b.data.localeCompare(a.data));let rows='';registos.forEach((h,i)=>{const dow=DIAS_SEMANA[getDow(h.data)];rows+=`<div class="hora-row"><span class="hora-dia">${formatDate(h.data)}</span><span class="hora-dow">${dow}</span><span class="hora-val">${h.qtd}h</span><span class="hora-del" onclick="HORAS.deletarHora('${c.id}',${i})">&times;</span></div>`;});html+=`<div class="colaborador-card"><div class="colab-card-header"><div class="colab-avatar" style="background:${c.cor}">${initials(c.nome)}</div><div class="colab-info"><div class="colab-name">${c.nome} <span class="colab-id">${c.id}</span></div><div class="colab-meta">${c.cargo}</div></div></div><div class="colab-card-body"><button class="btn btn-primary colab-btn-registro" onclick="HORAS.abrirModalHoras('${c.id}')">REGISTRO</button><div class="colab-horas-list">${rows}</div></div></div>`;});html+='</div>';}document.getElementById('mainContent').innerHTML=html;},
  abrirModalColab(colabId){if(colabId){const c=this.colaboradores.find(x=>x.id===colabId);if(c){document.getElementById('newNome').value=c.nome;document.getElementById('newId').value=c.id;}}this.openModal('modalColab');},
  abrirModalHoras(colabId){this.currentColabId=colabId;document.getElementById('lhData').value=todayISO();this.openModal('modalHoras');},
  salvarColaborador(){const n=sanitize(document.getElementById('newNome').value.trim());if(!n){toast('Nome inválido','error');return;}const id='HP-'+new Date().getFullYear().toString().slice(-2)+'-'+String(this.colaboradores.filter(c=>c.id.startsWith('HP-'+new Date().getFullYear().toString().slice(-2))).length+1).padStart(3,'0');this.colaboradores.push({id,nome:n,cargo:document.getElementById('newCargo').value||'Operário',tipoContrato:document.getElementById('newTipoContrato').value,valorHora:parseFloat(document.getElementById('newValorHora').value)||12,vencimento:parseFloat(document.getElementById('newVencimentoMensal').value)||820,cor:document.getElementById('newCor').value,ativo:true,inicio:document.getElementById('newDataInicio').value||todayISO(),status:'ativo'});this.horas[id]=[];this.save();this.closeModal('modalColab');this.render();toast(n+' adicionado','success');},
  salvarHoras(){const data=document.getElementById('lhData').value,tipo=document.getElementById('lhTipo').value,qtd=tipo==='horas'?parseFloat(document.getElementById('lhHoras').value):0;if(!data){toast('Selecione uma data','error');return;}if(!this.horas[this.currentColabId])this.horas[this.currentColabId]=[];const idx=this.horas[this.currentColabId].findIndex(h=>h.data===data);if(idx>=0){this.horas[this.currentColabId][idx]={data,tipo,qtd,obs:document.getElementById('lhObs').value};}else{this.horas[this.currentColabId].push({data,tipo,qtd,obs:document.getElementById('lhObs').value});}this.save();this.closeModal('modalHoras');this.render();toast('Registo lançado','success');},
  deletarHora(colabId,idx){if(confirm('Remover?')){this.horas[colabId].splice(idx,1);this.save();this.render();toast('Removido','info');}},
  toggleContractFields(){const t=document.getElementById('newTipoContrato').value;document.getElementById('valorHoraGroup').style.display=(t==='incerto')?'block':'none';document.getElementById('vencimentoGroup').style.display=(t==='fixo')?'block':'none';},
  toggleHorasInput(){const t=document.getElementById('lhTipo').value;document.getElementById('lhHorasGroup').style.display=(t==='horas')?'block':'none';document.getElementById('lhCategoriaGroup').style.display=(t==='atestado')?'block':'none';},
  atualizarObsCategoria(){const cat=document.getElementById('lhCategoriaAtestado').value;document.getElementById('lhObs').value=cat;},
  abrirContato(){this.openModal('modalContato');},
  abrirAjuda(){this.openModal('modalAjuda');},
  async init(){await fetch('/api/dados').then(r=>r.json()).then(data=>{if(data.colaboradores){this.colaboradores=data.colaboradores;this.horas=data.horas||{}}this.render();}).catch(()=>this.render());}
};

document.addEventListener('DOMContentLoaded',()=>HORAS.init());
</script>
</body>
</html>
